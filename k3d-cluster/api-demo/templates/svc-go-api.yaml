apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.go-api.service.name }}
  namespace: {{ .Values.go-api.namespace }}
spec:
  ports:
  - name: http
    port: {{ .Values.go-api.service.port }}
    protocol: TCP
    targetPort: {{ .Values.go-api.service.targetPort }}
  selector:
    app: {{ .Values.go-api.name }}
status:
  loadBalancer: {}